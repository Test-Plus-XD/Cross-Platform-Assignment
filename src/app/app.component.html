<ion-app>
  <!-- Global Menu -->
  <ion-menu side="start" menuId="main-menu" contentId="main-content" type="push">
    <app-shared-menu></app-shared-menu>
  </ion-menu>

  <div class="app-shell" id="main-content">
    <!-- Global header -->
    <app-shared-header></app-shared-header>

    <!-- Router outlet -->
    <ion-router-outlet></ion-router-outlet>

    <!-- Global footer -->
    <app-shared-footer></app-shared-footer>

    <!-- Mobile tab bar -->
    <app-shared-tab></app-shared-tab>

    <!-- AI Assistant (Global) -->
    <app-gemini-button></app-gemini-button>
  </div>
</ion-app>
