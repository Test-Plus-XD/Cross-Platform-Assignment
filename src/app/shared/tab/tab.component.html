<!-- Tab bar rendered only when UIService says to show (mobile platform) -->
<div id="app-shared-tab" class="shared-tab" *ngIf="showTabs$ | async">
  <ng-container *ngIf="appState$ | async as appState">
    <!-- Standalone ion-tab-bar (no ion-tabs wrapper) — avoids the auto-injected
         secondary <ion-router-outlet tabs="true"> that ion-tabs creates, which
         competed with the primary outlet and caused blank pages on Android. -->
    <ion-tab-bar>
      <!-- Chat button - left-most, only show when logged in -->
      <ion-tab-button routerLink="/chat/main" *ngIf="appState.isLoggedIn" (pointerdown)="onTabPointerDown($event)">
        <span class="tab-icon-shell tab-icon-chatbubbles" aria-hidden="true">
          <ion-icon class="tab-icon-default" name="chatbubbles"></ion-icon>
          <span class="tab-icon-gradient"></span>
        </span>
        <ion-label>{{ (lang$ | async) === 'TC' ? '聊天' : 'Chat' }}</ion-label>
        <ion-ripple-effect type="unbounded" class="extra-tab-ripple extra-tab-ripple-middle" aria-hidden="true"></ion-ripple-effect>
        <ion-ripple-effect type="unbounded" class="extra-tab-ripple extra-tab-ripple-outer" aria-hidden="true"></ion-ripple-effect>
      </ion-tab-button>

      <ion-tab-button routerLink="/home" (pointerdown)="onTabPointerDown($event)">
        <span class="tab-icon-shell tab-icon-home" aria-hidden="true">
          <ion-icon class="tab-icon-default" name="home"></ion-icon>
          <span class="tab-icon-gradient"></span>
        </span>
        <ion-label>{{ (lang$ | async) === 'TC' ? '主頁' : 'Home' }}</ion-label>
        <ion-ripple-effect type="unbounded" class="extra-tab-ripple extra-tab-ripple-middle" aria-hidden="true"></ion-ripple-effect>
        <ion-ripple-effect type="unbounded" class="extra-tab-ripple extra-tab-ripple-outer" aria-hidden="true"></ion-ripple-effect>
      </ion-tab-button>

      <ion-tab-button routerLink="/search" (pointerdown)="onTabPointerDown($event)">
        <span class="tab-icon-shell tab-icon-search" aria-hidden="true">
          <ion-icon class="tab-icon-default" name="search"></ion-icon>
          <span class="tab-icon-gradient"></span>
        </span>
        <ion-label>{{ (lang$ | async) === 'TC' ? '搜尋' : 'Search' }}</ion-label>
        <ion-ripple-effect type="unbounded" class="extra-tab-ripple extra-tab-ripple-middle" aria-hidden="true"></ion-ripple-effect>
        <ion-ripple-effect type="unbounded" class="extra-tab-ripple extra-tab-ripple-outer" aria-hidden="true"></ion-ripple-effect>
      </ion-tab-button>

      <ion-tab-button routerLink="/user" (pointerdown)="onTabPointerDown($event)">
        <span class="tab-icon-shell tab-icon-person" aria-hidden="true">
          <ion-icon class="tab-icon-default" name="person"></ion-icon>
          <span class="tab-icon-gradient"></span>
        </span>
        <ion-label>{{ (lang$ | async) === 'TC' ? '帳戶' : 'Account' }}</ion-label>
        <ion-ripple-effect type="unbounded" class="extra-tab-ripple extra-tab-ripple-middle" aria-hidden="true"></ion-ripple-effect>
        <ion-ripple-effect type="unbounded" class="extra-tab-ripple extra-tab-ripple-outer" aria-hidden="true"></ion-ripple-effect>
      </ion-tab-button>

      <!-- Bookings button - for Diner users -->
      <ion-tab-button routerLink="/booking" *ngIf="appState.isLoggedIn && !(isRestaurantUser$ | async)" (pointerdown)="onTabPointerDown($event)">
        <span class="tab-icon-shell tab-icon-calendar" aria-hidden="true">
          <ion-icon class="tab-icon-default" name="calendar"></ion-icon>
          <span class="tab-icon-gradient"></span>
        </span>
        <ion-label>{{ (lang$ | async) === 'TC' ? '預約' : 'Bookings' }}</ion-label>
        <ion-ripple-effect type="unbounded" class="extra-tab-ripple extra-tab-ripple-middle" aria-hidden="true"></ion-ripple-effect>
        <ion-ripple-effect type="unbounded" class="extra-tab-ripple extra-tab-ripple-outer" aria-hidden="true"></ion-ripple-effect>
      </ion-tab-button>

      <!-- Store button - for Restaurant users -->
      <ion-tab-button routerLink="/store" *ngIf="appState.isLoggedIn && (isRestaurantUser$ | async)" (pointerdown)="onTabPointerDown($event)">
        <span class="tab-icon-shell tab-icon-storefront" aria-hidden="true">
          <ion-icon class="tab-icon-default" name="storefront"></ion-icon>
          <span class="tab-icon-gradient"></span>
        </span>
        <ion-label>{{ (lang$ | async) === 'TC' ? '商鋪' : 'Store' }}</ion-label>
        <ion-ripple-effect type="unbounded" class="extra-tab-ripple extra-tab-ripple-middle" aria-hidden="true"></ion-ripple-effect>
        <ion-ripple-effect type="unbounded" class="extra-tab-ripple extra-tab-ripple-outer" aria-hidden="true"></ion-ripple-effect>
      </ion-tab-button>
    </ion-tab-bar>
  </ng-container>
</div>
